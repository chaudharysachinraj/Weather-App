<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">

    <!-- Imort google icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

</head>

<body>

    <main class="main-container">

        <header class="input-container">
            <input class="city-input" type="text" placeholder="Search city">
            <button class="search-btn">
                <span class="material-symbols-outlined">
                    search
                </span>
            </button>
        </header>

        <section class="weather-info" style="display: none;">
            <div class="location-data-container">
                <div class="location">
                    <span class="material-symbols-outlined">
                        location_on
                    </span>
                    <h4 class="country-txt">Jakarta</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Thu, 18 Jun</h5>
            </div>

            <div class="weather-summary-container">
                <img src="./assets/weather/clouds.svg" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-txt">29 °C</h1>
                    <h3 class="condition-txt regular-txt">Clouds</h3>
                </div>
            </div>

            <div class="weather-conditions-container">
                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        water_drop
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Humidity</h5>
                        <h5 class="humidity-value-txt">55%</h5>
                    </div>
                </div>
                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        air
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-txt">Wind Speed</h5>
                        <h5 class="wind-value-txt">2 M/s</h5>
                    </div>
                </div>
            </div>

            <div class="forecast-items-conatiner">
                <div class="forecast-item">
                    <h5 class="forecast-item-date">
                        05 Aug
                    </h5>
                    <img src="./assets/weather/thunderstorm.svg" class="forecast-img">
                    <h5 class="forecast-item-txt">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date">
                        05 Aug
                    </h5>
                    <img src="./assets/weather/thunderstorm.svg" class="forecast-img">
                    <h5 class="forecast-item-txt">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date">
                        05 Aug
                    </h5>
                    <img src="./assets/weather/thunderstorm.svg" class="forecast-img">
                    <h5 class="forecast-item-txt">29 °C</h5>
                </div>
                <div class="forecast-item">
                    <h5 class="forecast-item-date">
                        05 Aug
                    </h5>
                    <img src="./assets/weather/thunderstorm.svg" class="forecast-img">
                    <h5 class="forecast-item-txt">29 °C</h5>
                </div>
            </div>

        </section>

        <section class="search-city section-message">
            <img class="message-img" src="assets/message/search-city.png" >
            <div>
                <h1>Search City</h1>
                <h4 class="regular-txt">
                    Find out the weather condition of the city
                </h4>
            </div>
        </section>


    </main>

    <script src="app.js"></script>

</body>

</html>
